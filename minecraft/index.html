<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minecraft Browser Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
    #game-canvas { display: block; }
    #crosshair {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 20px; height: 20px; pointer-events: none;
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute; background: rgba(255,255,255,0.8);
    }
    #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
    #crosshair::after  { height: 2px; width: 100%; top: 50%; transform: translateY(-50%); }
    #hud {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 4px;
    }
    .slot {
      width: 52px; height: 52px; border: 2px solid #555;
      background: rgba(0,0,0,0.6); display: flex; align-items: center;
      justify-content: center; cursor: pointer; position: relative;
    }
    .slot.active { border-color: #fff; }
    .slot canvas { image-rendering: pixelated; }
    .slot-label {
      position: absolute; bottom: 2px; right: 4px;
      font-size: 10px; color: #fff; text-shadow: 1px 1px 0 #000;
    }
    #info {
      position: fixed; top: 10px; left: 10px;
      color: #fff; font-size: 13px; text-shadow: 1px 1px 0 #000;
      background: rgba(0,0,0,0.4); padding: 6px 10px; border-radius: 4px;
      line-height: 1.6;
    }
    #overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: #fff; z-index: 100;
    }
    #overlay h1 { font-size: 48px; color: #7cfc00; text-shadow: 3px 3px 0 #2a5c00; margin-bottom: 20px; }
    #overlay p  { font-size: 16px; color: #ccc; margin: 4px 0; }
    #play-btn {
      margin-top: 30px; padding: 12px 40px; font-size: 20px;
      background: #5a8a2a; color: #fff; border: 3px solid #8cc84b;
      cursor: pointer; font-family: inherit; letter-spacing: 1px;
    }
    #play-btn:hover { background: #6aaa30; }
    #block-name {
      position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%);
      color: #fff; font-size: 14px; text-shadow: 1px 1px 0 #000;
      background: rgba(0,0,0,0.5); padding: 2px 8px; border-radius: 3px;
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <div id="crosshair"></div>
  <div id="hud"></div>
  <div id="block-name"></div>
  <div id="info">
    <span id="fps">FPS: 0</span><br>
    <span id="pos">Pos: 0, 0, 0</span><br>
    <span id="look">Look: 0°</span>
  </div>
  <div id="overlay">
    <h1>&#x26F0; MINECRAFT</h1>
    <p>WASD — Move &nbsp;|&nbsp; Space — Jump &nbsp;|&nbsp; Shift — Crouch</p>
    <p>Left Click — Break block &nbsp;|&nbsp; Right Click — Place block</p>
    <p>1-7 — Select block &nbsp;|&nbsp; Mouse Wheel — Scroll hotbar</p>
    <button id="play-btn" onclick="startGame()">PLAY</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
  // ─────────────────────────────────────────────────────────
  // PROCEDURAL TEXTURE GENERATION (Canvas 2D pixel art)
  // ─────────────────────────────────────────────────────────
  const TEX_SIZE = 16;

  function makeCanvas(w, h) {
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    return c;
  }

  function makeTexture(drawFn) {
    const c = makeCanvas(TEX_SIZE, TEX_SIZE);
    const ctx = c.getContext('2d');
    drawFn(ctx, c);
    const t = new THREE.CanvasTexture(c);
    t.magFilter = THREE.NearestFilter;
    t.minFilter = THREE.NearestFilter;
    return t;
  }

  function rng(seed) {
    let s = seed;
    return () => { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 0xffffffff; };
  }

  // Grass Top — green with variation
  function drawGrassTop(ctx) {
    const rand = rng(1);
    for (let y = 0; y < TEX_SIZE; y++) {
      for (let x = 0; x < TEX_SIZE; x++) {
        const v = Math.floor(rand() * 30);
        const r = 80 + v; const g = 160 + v; const b = 40 + v;
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.fillRect(x, y, 1, 1);
      }
    }
  }

  // Grass Side — top green strip, brown/dirt below
  function drawGrassSide(ctx) {
    const rand = rng(2);
    for (let y = 0; y < TEX_SIZE; y++) {
      for (let x = 0; x < TEX_SIZE; x++) {
        const v = Math.floor(rand() * 20);
        let r, g, b;
        if (y < 3) { r = 85+v; g = 150+v; b = 40+v; }
        else       { r = 134+v; g = 96+v; b = 67+v; }
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.fillRect(x, y, 1, 1);
      }
    }
  }

  // Dirt
  function drawDirt(ctx) {
    const rand = rng(3);
    for (let y = 0; y < TEX_SIZE; y++) {
      for (let x = 0; x < TEX_SIZE; x++) {
        const v = Math.floor(rand() * 25);
        ctx.fillStyle = `rgb(${134+v},${96+v},${67+v})`;
        ctx.fillRect(x, y, 1, 1);
      }
    }
  }

  // Stone — gray with crack lines
  function drawStone(ctx) {
    const rand = rng(4);
    for (let y = 0; y < TEX_SIZE; y++) {
      for (let x = 0; x < TEX_SIZE; x++) {
        const v = Math.floor(rand() * 30);
        const c = 120 + v;
        ctx.fillStyle = `rgb(${c},${c},${c})`;
        ctx.fillRect(x, y, 1, 1);
      }
    }
    // crack lines
    ctx.fillStyle = 'rgba(80,80,80,0.6)';
    ctx.fillRect(4, 0, 1, 7);
    ctx.fillRect(0, 6, 5, 1);
    ctx.fillRect(11, 5, 1, 8);
    ctx.fillRect(8, 13, 8, 1);
    ctx.fillRect(8, 0, 1, 5);
  }

  // Wood trunk side — brown with vertical grain
  function drawWoodSide(ctx) {
    const rand = rng(5);
    for (let y = 0; y < TEX_SIZE; y++) {
      for (let x = 0; x < TEX_SIZE; x++) {
        const v = Math.floor(rand() * 15);
        const stripe = Math.abs(x - 8) < 2 ? -20 : 0;
        ctx.fillStyle = `rgb(${100+v+stripe},${70+v+stripe},${40+v})`;
        ctx.fillRect(x, y, 1, 1);
      }
    }
    ctx.fillStyle = 'rgba(60,40,20,0.3)';
    for (let x = 0; x < TEX_SIZE; x+=3) ctx.fillRect(x, 0, 1, TEX_SIZE);
  }

  // Wood trunk top — rings
  function drawWoodTop(ctx) {
    const rand = rng(6);
    for (let y = 0; y < TEX_SIZE; y++) {
      for (let x = 0; x < TEX_SIZE; x++) {
        const v = Math.floor(rand() * 10);
        const dx = x - 7.5; const dy = y - 7.5;
        const d = Math.sqrt(dx*dx + dy*dy);
        const ring = Math.floor(d / 2.5) % 2;
        const base = ring ? 90 : 110;
        ctx.fillStyle = `rgb(${base+v},${base*0.7+v},${base*0.4+v})`;
        ctx.fillRect(x, y, 1, 1);
      }
    }
  }

  // Leaves — dithered green
  function drawLeaves(ctx) {
    const rand = rng(7);
    for (let y = 0; y < TEX_SIZE; y++) {
      for (let x = 0; x < TEX_SIZE; x++) {
        if (rand() < 0.15) {
          ctx.fillStyle = 'rgba(0,0,0,0)';
          ctx.clearRect(x, y, 1, 1);
        } else {
          const v = Math.floor(rand() * 40);
          ctx.fillStyle = `rgb(${30+v},${100+v},${20+v})`;
          ctx.fillRect(x, y, 1, 1);
        }
      }
    }
  }

  // Water — blue animated (will reuse for now)
  function drawWater(ctx) {
    const rand = rng(8);
    for (let y = 0; y < TEX_SIZE; y++) {
      for (let x = 0; x < TEX_SIZE; x++) {
        const v = Math.floor(rand() * 30);
        ctx.fillStyle = `rgba(30,${100+v},${200+v},0.8)`;
        ctx.fillRect(x, y, 1, 1);
      }
    }
    // wave lines
    ctx.fillStyle = 'rgba(100,180,255,0.5)';
    ctx.fillRect(0, 5, 16, 1);
    ctx.fillRect(0, 11, 16, 1);
  }

  // Sand
  function drawSand(ctx) {
    const rand = rng(9);
    for (let y = 0; y < TEX_SIZE; y++) {
      for (let x = 0; x < TEX_SIZE; x++) {
        const v = Math.floor(rand() * 25);
        ctx.fillStyle = `rgb(${220+v},${200+v},${130+v})`;
        ctx.fillRect(x, y, 1, 1);
      }
    }
  }

  // ─────────────────────────────────────────────────────────
  // BLOCK DEFINITIONS
  // ─────────────────────────────────────────────────────────
  const BLOCKS = {
    GRASS:  1,
    STONE:  2,
    DIRT:   3,
    WOOD:   4,
    LEAVES: 5,
    WATER:  6,
    SAND:   7,
  };

  const BLOCK_NAMES = {
    1: 'Grass', 2: 'Stone', 3: 'Dirt',
    4: 'Wood', 5: 'Leaves', 6: 'Water', 7: 'Sand',
  };

  let blockTextures = {};

  function buildTextures() {
    const grassTop   = makeTexture(drawGrassTop);
    const grassSide  = makeTexture(drawGrassSide);
    const grassBot   = makeTexture(drawDirt);
    const dirt       = makeTexture(drawDirt);
    const stone      = makeTexture(drawStone);
    const woodSide   = makeTexture(drawWoodSide);
    const woodTop    = makeTexture(drawWoodTop);
    const leaves     = makeTexture(drawLeaves);
    const water      = makeTexture(drawWater);
    const sand       = makeTexture(drawSand);

    // [+x, -x, +y, -y, +z, -z] = [right, left, top, bottom, front, back]
    blockTextures = {
      [BLOCKS.GRASS]:  [grassSide, grassSide, grassTop, grassBot, grassSide, grassSide],
      [BLOCKS.STONE]:  [stone, stone, stone, stone, stone, stone],
      [BLOCKS.DIRT]:   [dirt, dirt, dirt, dirt, dirt, dirt],
      [BLOCKS.WOOD]:   [woodSide, woodSide, woodTop, woodTop, woodSide, woodSide],
      [BLOCKS.LEAVES]: [leaves, leaves, leaves, leaves, leaves, leaves],
      [BLOCKS.WATER]:  [water, water, water, water, water, water],
      [BLOCKS.SAND]:   [sand, sand, sand, sand, sand, sand],
    };
  }

  function makeMaterialsForBlock(blockType) {
    const texs = blockTextures[blockType];
    return texs.map(t => {
      const mat = new THREE.MeshLambertMaterial({ map: t });
      if (blockType === BLOCKS.LEAVES) { mat.transparent = true; mat.alphaTest = 0.1; }
      if (blockType === BLOCKS.WATER)  { mat.transparent = true; mat.opacity = 0.75; }
      return mat;
    });
  }

  // ─────────────────────────────────────────────────────────
  // WORLD / CHUNK DATA
  // ─────────────────────────────────────────────────────────
  const CHUNK_SIZE   = 16;
  const WORLD_HEIGHT = 64;
  const SEA_LEVEL    = 28;

  // World stored as Map<"cx,cz", Uint8Array>
  const chunks = new Map();
  const chunkMeshes = new Map();
  const RENDER_DIST = 4; // chunks

  function chunkKey(cx, cz) { return `${cx},${cz}`; }

  function getChunk(cx, cz) {
    const k = chunkKey(cx, cz);
    if (!chunks.has(k)) generateChunk(cx, cz);
    return chunks.get(k);
  }

  function blockIndex(lx, y, lz) { return lx + CHUNK_SIZE * (y + WORLD_HEIGHT * lz); }

  function getBlock(x, y, z) {
    if (y < 0 || y >= WORLD_HEIGHT) return 0;
    const cx = Math.floor(x / CHUNK_SIZE);
    const cz = Math.floor(z / CHUNK_SIZE);
    const lx = ((x % CHUNK_SIZE) + CHUNK_SIZE) % CHUNK_SIZE;
    const lz = ((z % CHUNK_SIZE) + CHUNK_SIZE) % CHUNK_SIZE;
    return getChunk(cx, cz)[blockIndex(lx, y, lz)];
  }

  function setBlock(x, y, z, type) {
    if (y < 0 || y >= WORLD_HEIGHT) return;
    const cx = Math.floor(x / CHUNK_SIZE);
    const cz = Math.floor(z / CHUNK_SIZE);
    const lx = ((x % CHUNK_SIZE) + CHUNK_SIZE) % CHUNK_SIZE;
    const lz = ((z % CHUNK_SIZE) + CHUNK_SIZE) % CHUNK_SIZE;
    getChunk(cx, cz)[blockIndex(lx, y, lz)] = type;
    // Rebuild this chunk and neighbors
    markChunkDirty(cx, cz);
    if (lx === 0) markChunkDirty(cx-1, cz);
    if (lx === CHUNK_SIZE-1) markChunkDirty(cx+1, cz);
    if (lz === 0) markChunkDirty(cx, cz-1);
    if (lz === CHUNK_SIZE-1) markChunkDirty(cx, cz+1);
  }

  const dirtyChunks = new Set();
  function markChunkDirty(cx, cz) { dirtyChunks.add(chunkKey(cx, cz)); }

  // ─────────────────────────────────────────────────────────
  // TERRAIN GENERATION (simple noise)
  // ─────────────────────────────────────────────────────────
  function smoothNoise(x, z, scale, octaves) {
    let val = 0, amp = 1, freq = 1, max = 0;
    for (let i = 0; i < octaves; i++) {
      val += simplexLike(x * freq / scale, z * freq / scale) * amp;
      max += amp; amp *= 0.5; freq *= 2;
    }
    return val / max;
  }

  function simplexLike(x, z) {
    const ix = Math.floor(x); const iz = Math.floor(z);
    const fx = x - ix; const fz = z - iz;
    const ux = fx*fx*(3-2*fx); const uz = fz*fz*(3-2*fz);
    return lerp(lerp(dot2(ix,iz,fx,fz), dot2(ix+1,iz,fx-1,fz), ux),
                lerp(dot2(ix,iz+1,fx,fz-1), dot2(ix+1,iz+1,fx-1,fz-1), ux), uz);
  }

  function lerp(a, b, t) { return a + (b-a)*t; }

  function dot2(ix, iz, fx, fz) {
    const h = hash2(ix, iz) & 7;
    const gx = [1,-1,1,-1,1,-1,0,0][h];
    const gz = [1,1,-1,-1,0,0,1,-1][h];
    return gx*fx + gz*fz;
  }

  function hash2(x, z) {
    let h = (x * 374761393 + z * 668265263);
    h = (h ^ (h >> 13)) * 1274126177;
    return h ^ (h >> 16);
  }

  function generateChunk(cx, cz) {
    const data = new Uint8Array(CHUNK_SIZE * WORLD_HEIGHT * CHUNK_SIZE);
    for (let lx = 0; lx < CHUNK_SIZE; lx++) {
      for (let lz = 0; lz < CHUNK_SIZE; lz++) {
        const wx = cx * CHUNK_SIZE + lx;
        const wz = cz * CHUNK_SIZE + lz;
        const h = Math.floor(SEA_LEVEL + smoothNoise(wx, wz, 40, 4) * 12);
        const clampH = Math.max(1, Math.min(WORLD_HEIGHT-1, h));

        for (let y = 0; y <= clampH; y++) {
          let block;
          if (y === clampH) {
            if (y <= SEA_LEVEL) block = BLOCKS.SAND;
            else block = BLOCKS.GRASS;
          } else if (y >= clampH - 3) {
            block = BLOCKS.DIRT;
          } else {
            block = BLOCKS.STONE;
          }
          data[blockIndex(lx, y, lz)] = block;
        }

        // Water fill
        for (let y = clampH + 1; y <= SEA_LEVEL; y++) {
          data[blockIndex(lx, y, lz)] = BLOCKS.WATER;
        }

        // Trees (on grass, above sea level)
        if (clampH > SEA_LEVEL && Math.abs(hash2(wx, wz)) % 20 === 0) {
          const trunkH = 4 + (Math.abs(hash2(wx+1, wz)) % 3);
          for (let t = 1; t <= trunkH; t++) {
            if (clampH+t < WORLD_HEIGHT) data[blockIndex(lx, clampH+t, lz)] = BLOCKS.WOOD;
          }
          // leaves
          for (let dx = -2; dx <= 2; dx++) {
            for (let dz = -2; dz <= 2; dz++) {
              for (let dy = -1; dy <= 1; dy++) {
                if (Math.abs(dx)+Math.abs(dz)+Math.abs(dy) > 3) continue;
                const lfy = clampH + trunkH + dy;
                const lfx = lx + dx; const lfz = lz + dz;
                if (lfx >= 0 && lfx < CHUNK_SIZE && lfz >= 0 && lfz < CHUNK_SIZE && lfy < WORLD_HEIGHT) {
                  if (data[blockIndex(lfx, lfy, lfz)] === 0)
                    data[blockIndex(lfx, lfy, lfz)] = BLOCKS.LEAVES;
                }
              }
            }
          }
        }
      }
    }
    chunks.set(chunkKey(cx, cz), data);
    markChunkDirty(cx, cz);
  }

  // ─────────────────────────────────────────────────────────
  // CHUNK MESH BUILDING (greedy-style, per-face culling)
  // ─────────────────────────────────────────────────────────
  const geo = new THREE.BoxGeometry(1, 1, 1);

  function buildChunkMesh(cx, cz) {
    const k = chunkKey(cx, cz);
    // Remove old mesh
    if (chunkMeshes.has(k)) {
      const old = chunkMeshes.get(k);
      old.forEach(m => { scene.remove(m); m.geometry.dispose(); });
      chunkMeshes.delete(k);
    }

    const data = getChunk(cx, cz);
    // Group by block type for instanced rendering
    const positions = {}; // blockType -> [x,y,z,...]

    for (let lx = 0; lx < CHUNK_SIZE; lx++) {
      for (let y = 0; y < WORLD_HEIGHT; y++) {
        for (let lz = 0; lz < CHUNK_SIZE; lz++) {
          const b = data[blockIndex(lx, y, lz)];
          if (b === 0) continue;
          const wx = cx * CHUNK_SIZE + lx;
          const wz = cz * CHUNK_SIZE + lz;
          // Check if any face is exposed
          const exposed = (
            getBlock(wx+1,y,wz) === 0 || getBlock(wx-1,y,wz) === 0 ||
            getBlock(wx,y+1,wz) === 0 || getBlock(wx,y-1,wz) === 0 ||
            getBlock(wx,y,wz+1) === 0 || getBlock(wx,y,wz-1) === 0
          );
          if (!exposed) continue;
          if (!positions[b]) positions[b] = [];
          positions[b].push(wx, y, wz);
        }
      }
    }

    const meshes = [];
    for (const [blockType, pos] of Object.entries(positions)) {
      if (!pos.length) continue;
      const count = pos.length / 3;
      const materials = makeMaterialsForBlock(Number(blockType));
      const iMesh = new THREE.InstancedMesh(geo, materials, count);
      iMesh.castShadow = false;
      iMesh.receiveShadow = false;
      const matrix = new THREE.Matrix4();
      for (let i = 0; i < count; i++) {
        matrix.setPosition(pos[i*3], pos[i*3+1], pos[i*3+2]);
        iMesh.setMatrixAt(i, matrix);
      }
      iMesh.instanceMatrix.needsUpdate = true;
      scene.add(iMesh);
      meshes.push(iMesh);
    }
    chunkMeshes.set(k, meshes);
  }

  // ─────────────────────────────────────────────────────────
  // SCENE SETUP
  // ─────────────────────────────────────────────────────────
  let scene, camera, renderer;
  let started = false;

  function initScene() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);
    scene.fog = new THREE.Fog(0x87ceeb, 40, 80);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.05, 200);

    renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game-canvas'), antialias: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    // Lighting
    const ambient = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambient);
    const sun = new THREE.DirectionalLight(0xfff0cc, 1.2);
    sun.position.set(50, 100, 50);
    scene.add(sun);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  }

  // ─────────────────────────────────────────────────────────
  // PLAYER CONTROLLER
  // ─────────────────────────────────────────────────────────
  const player = {
    pos: new THREE.Vector3(8, 40, 8),
    vel: new THREE.Vector3(),
    yaw: 0, pitch: 0,
    onGround: false,
    height: 1.75,
    radius: 0.3,
    speed: 5,
    jumpSpeed: 8,
  };

  const keys = {};
  let selectedSlot = 0;
  const hotbar = [BLOCKS.GRASS, BLOCKS.STONE, BLOCKS.DIRT, BLOCKS.WOOD, BLOCKS.LEAVES, BLOCKS.SAND, BLOCKS.WATER];

  document.addEventListener('keydown', e => { keys[e.code] = true; });
  document.addEventListener('keyup',   e => { keys[e.code] = false; });
  document.addEventListener('keydown', e => {
    if (e.code.startsWith('Digit')) {
      const n = parseInt(e.key) - 1;
      if (n >= 0 && n < hotbar.length) setSelectedSlot(n);
    }
  });

  document.addEventListener('mousemove', e => {
    if (!started) return;
    player.yaw   -= e.movementX * 0.002;
    player.pitch -= e.movementY * 0.002;
    player.pitch = Math.max(-Math.PI/2 + 0.01, Math.min(Math.PI/2 - 0.01, player.pitch));
  });

  document.addEventListener('wheel', e => {
    selectedSlot = (selectedSlot + (e.deltaY > 0 ? 1 : -1) + hotbar.length) % hotbar.length;
    updateHotbarUI();
  });

  // Block interaction
  const raycaster = new THREE.Raycaster();
  const REACH = 5;

  document.addEventListener('mousedown', e => {
    if (!started) return;
    if (e.button === 0) breakBlock();
    if (e.button === 2) placeBlock();
  });

  document.addEventListener('contextmenu', e => e.preventDefault());

  function getTargetBlock() {
    const dir = new THREE.Vector3();
    camera.getWorldDirection(dir);
    let px = player.pos.x, py = player.pos.y + 0.5, pz = player.pos.z;
    const step = 0.05;
    let prevX = Math.floor(px), prevY = Math.floor(py), prevZ = Math.floor(pz);
    for (let d = 0; d < REACH; d += step) {
      const cx = Math.floor(px), cy = Math.floor(py), cz = Math.floor(pz);
      if (getBlock(cx, cy, cz) !== 0) {
        return { hit: { x: cx, y: cy, z: cz }, prev: { x: prevX, y: prevY, z: prevZ } };
      }
      prevX = cx; prevY = cy; prevZ = cz;
      px += dir.x * step; py += dir.y * step; pz += dir.z * step;
    }
    return null;
  }

  function breakBlock() {
    const t = getTargetBlock();
    if (t) { setBlock(t.hit.x, t.hit.y, t.hit.z, 0); rebuildNearby(t.hit.x, t.hit.z); }
  }

  function placeBlock() {
    const t = getTargetBlock();
    if (!t) return;
    const {x, y, z} = t.prev;
    // Don't place inside player
    const px = Math.floor(player.pos.x), py = Math.floor(player.pos.y), pz = Math.floor(player.pos.z);
    if (x === px && z === pz && (y === py || y === py+1)) return;
    setBlock(x, y, z, hotbar[selectedSlot]);
    rebuildNearby(x, z);
  }

  function rebuildNearby(wx, wz) {
    const cx = Math.floor(wx / CHUNK_SIZE);
    const cz = Math.floor(wz / CHUNK_SIZE);
    for (let dx = -1; dx <= 1; dx++)
      for (let dz = -1; dz <= 1; dz++)
        markChunkDirty(cx+dx, cz+dz);
  }

  // ─────────────────────────────────────────────────────────
  // PHYSICS (simple AABB)
  // ─────────────────────────────────────────────────────────
  const GRAVITY = -20;

  function physicsUpdate(dt) {
    // Apply gravity
    player.vel.y += GRAVITY * dt;
    if (keys['ShiftLeft'] || keys['ShiftRight']) player.vel.y = Math.max(-10, player.vel.y);

    // Movement direction
    const forward = new THREE.Vector3(-Math.sin(player.yaw), 0, -Math.cos(player.yaw));
    const right   = new THREE.Vector3(Math.cos(player.yaw), 0, -Math.sin(player.yaw));
    const moveDir = new THREE.Vector3();
    if (keys['KeyW']) moveDir.addScaledVector(forward, 1);
    if (keys['KeyS']) moveDir.addScaledVector(forward, -1);
    if (keys['KeyA']) moveDir.addScaledVector(right, -1);
    if (keys['KeyD']) moveDir.addScaledVector(right, 1);
    if (moveDir.lengthSq() > 0) moveDir.normalize();
    player.vel.x = moveDir.x * player.speed;
    player.vel.z = moveDir.z * player.speed;

    if ((keys['Space']) && player.onGround) player.vel.y = player.jumpSpeed;

    // Move and collide
    const dx = player.vel.x * dt;
    const dy = player.vel.y * dt;
    const dz = player.vel.z * dt;

    player.pos.x += dx; resolveAxis('x', dx);
    player.pos.y += dy; resolveAxis('y', dy);
    player.pos.z += dz; resolveAxis('z', dz);
  }

  function resolveAxis(axis, delta) {
    const r = player.radius;
    const bx = [player.pos.x - r, player.pos.x + r];
    const by = [player.pos.y,       player.pos.y + player.height];
    const bz = [player.pos.z - r, player.pos.z + r];

    for (let x = Math.floor(bx[0]); x <= Math.floor(bx[1]); x++) {
      for (let y = Math.floor(by[0]); y <= Math.floor(by[1]); y++) {
        for (let z = Math.floor(bz[0]); z <= Math.floor(bz[1]); z++) {
          const b = getBlock(x, y, z);
          if (b === 0 || b === BLOCKS.WATER) continue;
          if (axis === 'x') {
            if (delta > 0) player.pos.x = x - r - 0.001;
            else           player.pos.x = x + 1 + r + 0.001;
            player.vel.x = 0;
          } else if (axis === 'y') {
            if (delta < 0) { player.pos.y = y + 1; player.vel.y = 0; player.onGround = true; }
            else           { player.pos.y = y - player.height; player.vel.y = 0; }
          } else {
            if (delta > 0) player.pos.z = z - r - 0.001;
            else           player.pos.z = z + 1 + r + 0.001;
            player.vel.z = 0;
          }
          // Recalculate bounds after correction
          bx[0] = player.pos.x - r; bx[1] = player.pos.x + r;
          by[0] = player.pos.y;     by[1] = player.pos.y + player.height;
          bz[0] = player.pos.z - r; bz[1] = player.pos.z + r;
        }
      }
    }
    if (axis === 'y' && delta !== 0) {
      const below = getBlock(Math.floor(player.pos.x), Math.floor(player.pos.y) - 1, Math.floor(player.pos.z));
      if (below === 0 || below === BLOCKS.WATER) player.onGround = false;
    }
  }

  // ─────────────────────────────────────────────────────────
  // HUD
  // ─────────────────────────────────────────────────────────
  function buildHotbarUI() {
    const hud = document.getElementById('hud');
    hud.innerHTML = '';
    hotbar.forEach((bt, i) => {
      const slot = document.createElement('div');
      slot.className = 'slot' + (i === selectedSlot ? ' active' : '');
      slot.dataset.idx = i;
      // Mini texture preview
      const c = makeCanvas(32, 32);
      const ctx = c.getContext('2d');
      ctx.imageSmoothingEnabled = false;
      // Draw the top texture
      const texCanvas = blockTextures[bt][2].image;
      ctx.drawImage(texCanvas, 0, 0, 32, 32);
      c.style.width = '36px'; c.style.height = '36px';
      slot.appendChild(c);
      const lbl = document.createElement('span');
      lbl.className = 'slot-label';
      lbl.textContent = i + 1;
      slot.appendChild(lbl);
      slot.addEventListener('click', () => setSelectedSlot(i));
      hud.appendChild(slot);
    });
  }

  function setSelectedSlot(i) {
    selectedSlot = i;
    updateHotbarUI();
  }

  function updateHotbarUI() {
    document.querySelectorAll('.slot').forEach((s, i) => {
      s.className = 'slot' + (i === selectedSlot ? ' active' : '');
    });
    document.getElementById('block-name').textContent = BLOCK_NAMES[hotbar[selectedSlot]] || '';
  }

  // ─────────────────────────────────────────────────────────
  // CHUNK MANAGEMENT
  // ─────────────────────────────────────────────────────────
  function updateChunks() {
    const pcx = Math.floor(player.pos.x / CHUNK_SIZE);
    const pcz = Math.floor(player.pos.z / CHUNK_SIZE);

    // Generate needed chunks
    for (let dx = -RENDER_DIST; dx <= RENDER_DIST; dx++) {
      for (let dz = -RENDER_DIST; dz <= RENDER_DIST; dz++) {
        const cx = pcx + dx, cz = pcz + dz;
        if (!chunks.has(chunkKey(cx, cz))) generateChunk(cx, cz);
      }
    }

    // Rebuild dirty chunks in view
    for (const k of [...dirtyChunks]) {
      const [cx, cz] = k.split(',').map(Number);
      if (Math.abs(cx - pcx) <= RENDER_DIST && Math.abs(cz - pcz) <= RENDER_DIST) {
        buildChunkMesh(cx, cz);
        dirtyChunks.delete(k);
      }
    }

    // Remove far chunks
    for (const [k, meshes] of chunkMeshes) {
      const [cx, cz] = k.split(',').map(Number);
      if (Math.abs(cx - pcx) > RENDER_DIST + 1 || Math.abs(cz - pcz) > RENDER_DIST + 1) {
        meshes.forEach(m => { scene.remove(m); m.geometry.dispose(); });
        chunkMeshes.delete(k);
      }
    }
  }

  // ─────────────────────────────────────────────────────────
  // GAME LOOP
  // ─────────────────────────────────────────────────────────
  let lastTime = 0;
  let frameCount = 0;
  let fpsTime = 0;
  let fps = 0;

  function gameLoop(now) {
    requestAnimationFrame(gameLoop);
    const dt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;

    frameCount++;
    fpsTime += dt;
    if (fpsTime >= 1) { fps = frameCount; frameCount = 0; fpsTime = 0; }

    physicsUpdate(dt);
    updateChunks();

    // Update camera
    camera.position.set(player.pos.x, player.pos.y + player.height - 0.1, player.pos.z);
    camera.rotation.order = 'YXZ';
    camera.rotation.y = player.yaw;
    camera.rotation.x = player.pitch;

    // Highlight target block
    const tgt = getTargetBlock();
    // (simple — could add wireframe highlight)

    renderer.render(scene, camera);

    // Update info
    document.getElementById('fps').textContent = `FPS: ${fps}`;
    document.getElementById('pos').textContent =
      `Pos: ${player.pos.x.toFixed(1)}, ${player.pos.y.toFixed(1)}, ${player.pos.z.toFixed(1)}`;
    document.getElementById('look').textContent =
      `Yaw: ${(player.yaw * 180 / Math.PI).toFixed(0)}°`;
  }

  // ─────────────────────────────────────────────────────────
  // START
  // ─────────────────────────────────────────────────────────
  function startGame() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('game-canvas').requestPointerLock();
    started = true;
    lastTime = performance.now();
    requestAnimationFrame(gameLoop);
  }

  document.addEventListener('pointerlockchange', () => {
    if (!document.pointerLockElement) {
      started = false;
      document.getElementById('overlay').style.display = 'flex';
    }
  });

  // Init everything on load
  buildTextures();
  initScene();

  // Spawn player above terrain
  (function findSpawn() {
    for (let y = WORLD_HEIGHT - 1; y >= 0; y--) {
      if (getBlock(8, y, 8) !== 0) { player.pos.set(8.5, y + 1, 8.5); break; }
    }
  })();

  buildHotbarUI();
  updateChunks();
  </script>
</body>
</html>
